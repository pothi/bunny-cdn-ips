name: Update Bunny CDN IP Lists

on:
  schedule:
    - cron: '0 3 * * *'      # Daily at 3:00 AM UTC
  workflow_dispatch:         # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Update IP lists
        run: ./update-ips.sh

      - name: Get Stats
        id: stats
        run: |
          echo "ipv4=$(wc -l < bunny-ipv4.txt | xargs)" >> $GITHUB_OUTPUT
          echo "ipv6=$(wc -l < bunny-ipv6.txt | xargs)" >> $GITHUB_OUTPUT
          echo "total=$(wc -l < bunny-all.txt | xargs)" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n $(git status --porcelain) ]]; then
            git add bunny-*.txt bunny-real-ip.conf .last-hash
            git commit -m "chore: update Bunny CDN IP lists (auto)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes committed and pushed."
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit."
          fi

      - name: Set Release Date
        run: echo "RELEASE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Create Release
        if: steps.commit.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_DATE }}
          name: Bunny CDN IP Update - ${{ env.RELEASE_DATE }}
          body: |
            Automatic daily update of Bunny CDN edge server IP lists.

            ### Summary
            - IPv4: ${{ steps.stats.outputs.ipv4 }} addresses
            - IPv6: ${{ steps.stats.outputs.ipv6 }} addresses
            - Total: ${{ steps.stats.outputs.total }} addresses

            New in this release:
            - `bunny-real-ip.conf` – Ready-to-use for `set_real_ip_from`
          files: |
            bunny-ipv4.txt
            bunny-ipv6.txt
            bunny-all.txt
            bunny-real-ip.conf
          draft: false
          prerelease: false
